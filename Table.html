<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        
        table,th,td{
            /* border: 1px solid black; */
            border-collapse: collapse;
            border-radius: 8px;
            margin: 0 auto;
            color: white;
            text-align: center;
        }

        th,td {
            /* background-color: rgb(111, 199, 209); */
            border-style: outset;
        }
        th{
            height: 30px;
            color : black;
        }

        tr{
            height: 40px;
        }

        caption {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            color: black;
        }

        select {
            padding: 5px;
            border-radius: 4px;
            /* border: 1px solid rgb(111, 199, 209); */
            background-color: rgb(129, 242, 255);
        }
    </style>
</head>
<body>
    <h1 style="color: blue; text-align: center;">Table</h1>

    <table style="width: 40%; margin: 0 auto; border-collapse: collapse; " border="1">

        <caption>User Information</caption>

        <colgroup>
    <col span="1" style="background-color: #131313">
    <col span="4" style="background-color: rgb(111, 199, 209)">
  </colgroup>
        
        <tr Style="height: 30px;">
            <th style="width: 5%;"></th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Date of Birth</th>
        </tr>

        <tr>
            <td style="width: 5%;">1</td>
            <td>Haleema</td>
            <td>Ali</td>
            <td>haleema@example.com</td>
            <td rowspan="2">October</td>
        </tr>

        <tr>
            <td style="width: 5%;">2</td>
            <td>Ali</td>
            <td>Asghar</td>
            <td>ali@example.com</td>
            
        </tr>

        <tr>
            <td style="width: 5%;">3</td>
            <td colspan="2">Ayesha</td>
            <td>ayesha@example.com</td>
            <td>
                <select id="month">
                    <option>October</option>
                    <option>November</option>
                    <option>December</option>
                    <option>January</option>
                </select>
            </td>
        </tr>
    </table>

    <script>
const month = document.getElementById("month");

month.addEventListener("change", function () {
    alert("You selected: " + this.value);
});
</script>
</body>
</html>
