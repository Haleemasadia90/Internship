


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <link rel="stylesheet" href="Form.css">
</head>
<body>

<div class="container">
    <h1>Registration Form</h1>

    <form id="registerForm">

        <label for="fname"><b>First Name:</b></label>
        <input type="text" id="fname" placeholder="Enter your first name">

        <label for="lname"><b>Last Name:</b></label>
        <input type="text" id="lname" placeholder="Enter your last name">

        <label for="email"><b>Email:</b></label>
        <input type="email" id="email" placeholder="Enter your email">

        <div class="gender-group">
            <label for="gender"><b>Gender:</b></label>]
            <input type="radio" id="male" name="gender">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender">
            <label for="female">Female</label>
        </div>

        <label for="country"><b>Country:</b></label>
        <input type="text" id="country" placeholder="Enter your country">

        <div class="field-group">
   <label for="field"><b>Field of Study:</b></label>
<input type="checkbox" id="AI" name="AI" value="AI">
<label for="AI">AI</label>
<input type="checkbox" id="ML" name="ML" value="ML">
<label for="ML">ML</label>
<input type="checkbox" id="DS" name="DS" value="DS">
<label for="DS">DS</label>
<input type="checkbox" id="other" name="other" value="other">
<label for="other">Other</label>

        </div>

        <label for="phone"><b>Phone Number:</b></label>
<input
    type="tel"
    id="phone"
    name="phone"
    placeholder="03XXXXXXXXX"
    >
        <button type="submit">Submit</button>

    </form>
</div>

<script src="script.js"></script>

</body>
</html>
